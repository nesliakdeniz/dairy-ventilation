<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get the Dairy Ventilation App</title>
<meta name="description" content="Download the Dairy Ventilation app for free heat stress and ventilation decision support. Developed by UW-Madison Extension.">

<!-- Open Graph / social preview -->
<meta property="og:title" content="Dairy Ventilation App — UW-Madison Extension">
<meta property="og:description" content="Ventilation Decision Tool for Dairy Producers. Free, developed by UW-Madison Extension.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nesliakdeniz.github.io/dairy-ventilation/get">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #282728;
}
.container {
  background: white;
  max-width: 480px;
  width: 100%;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  padding: 40px 32px;
  text-align: center;
}
.banner {
  background: #C5050C;
  color: white;
  margin: -40px -32px 24px -32px;
  padding: 16px;
  border-radius: 16px 16px 0 0;
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 600;
}
h1 {
  font-size: 28px;
  color: #C5050C;
  margin-bottom: 8px;
}
.subtitle {
  color: #646569;
  font-size: 14px;
  margin-bottom: 28px;
  font-style: italic;
}
.status {
  background: #f7f7f7;
  border-left: 4px solid #C5050C;
  padding: 16px;
  margin-bottom: 24px;
  border-radius: 4px;
  font-size: 14px;
  text-align: left;
}
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #ddd;
  border-top-color: #C5050C;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.button-row {
  display: flex;
  gap: 12px;
  margin: 10px 0;
}
.button {
  display: block;
  flex: 1;
  padding: 14px 16px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  text-align: center;
  transition: transform 0.15s;
}
.button:hover { transform: translateY(-2px); }
.btn-primary {
  background: #C5050C;
  color: white;
}
.btn-secondary {
  background: white;
  color: #C5050C;
  border: 2px solid #C5050C;
}
.divider {
  margin: 24px 0 16px 0;
  color: #999;
  font-size: 12px;
}
.footer {
  margin-top: 32px;
  font-size: 12px;
  color: #999;
  line-height: 1.6;
}
.footer a {
  color: #C5050C;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="container">
  <div class="banner">UW-MADISON EXTENSION</div>
  <h1>Dairy Ventilation App</h1>
  <p class="subtitle">Ventilation Decision Tool for Dairy Producers</p>

  <div class="status" id="status">
    <span class="spinner"></span>
    <span id="status-text">Detecting your device…</span>
  </div>

  <div id="manual-buttons" style="display:none;">
    <div class="button-row">
      <a href="https://play.google.com/store/apps/details?id=edu.wisc.extension.dairyventilation" class="button btn-primary" id="android-btn" style="display:none;">
        Google Play
      </a>
      <a href="https://apps.apple.com/app/id6767579932" class="button btn-primary" id="ios-btn" style="display:none;">
        App Store
      </a>
    </div>
  </div>

  <div class="footer">
    Contact: <a href="mailto:nesli@wisc.edu">nesli@wisc.edu</a>
  </div>
</div>

<script>
(function() {
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isAndroid = /android/i.test(ua);
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var statusText = document.getElementById('status-text');
  var manualButtons = document.getElementById('manual-buttons');

  var androidUrl = "https://play.google.com/store/apps/details?id=edu.wisc.extension.dairyventilation";
  var iosUrl = "https://apps.apple.com/app/id6767579932";
  var webUrl = "https://nesliakdeniz.github.io/dairy-ventilation/";

  function showManual(targetMessage) {
    document.getElementById('status').style.background = '#fff';
    document.getElementById('status').style.borderLeft = 'none';
    statusText.innerHTML = targetMessage;
    document.querySelector('.spinner').style.display = 'none';
    manualButtons.style.display = 'block';
    document.getElementById('android-btn').style.display = 'block';
    document.getElementById('ios-btn').style.display = 'block';
  }

  if (isAndroid) {
    statusText.textContent = "Opening Google Play…";
    setTimeout(function() {
      window.location.href = androidUrl;
    }, 800);
    // Fallback: if redirect didn't happen, show manual buttons after 3 seconds
    setTimeout(function() {
      showManual("If Google Play didn't open automatically:");
    }, 3000);
  } else if (isIOS) {
    statusText.textContent = "Opening the App Store…";
    setTimeout(function() {
      window.location.href = iosUrl;
    }, 800);
    setTimeout(function() {
      showManual("If the App Store didn't open automatically:");
    }, 3000);
  } else {
    // Desktop or unknown — show all options
    setTimeout(function() {
      showManual("Choose where you'd like to go:");
    }, 400);
  }
})();
</script>
</body>
</html>
